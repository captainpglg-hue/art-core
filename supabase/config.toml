# ============================================================
# ART-CORE — Supabase CLI Configuration
# Docs: https://supabase.com/docs/guides/cli/config
# ============================================================
# Pour lier au projet distant :
#   supabase login
#   supabase link --project-ref <project-ref>
#
# Pour tester localement (Docker requis) :
#   supabase start
#   supabase db reset        # applique toutes les migrations
#   supabase db push         # pousse en production
# ============================================================

project_id = "art-core"

# ── API (PostgREST) ───────────────────────────────────────────
[api]
enabled        = true
port           = 54321
schemas        = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows       = 1000

[api.tls]
enabled = false

# ── Base de données ───────────────────────────────────────────
[db]
port           = 54322
shadow_port    = 54320
major_version  = 15

[db.pooler]
enabled          = false
port             = 54329
pool_mode        = "transaction"
default_pool_size = 20
max_client_conn  = 100

# ── Realtime ──────────────────────────────────────────────────
[realtime]
enabled = true
# ip_version = "IPv6"

# ── Studio (interface locale) ─────────────────────────────────
[studio]
enabled  = true
port     = 54323
api_url  = "http://127.0.0.1"

# ── Inbucket (emails locaux) ──────────────────────────────────
[inbucket]
enabled   = true
port      = 54324
smtp_port = 54325
pop3_port = 54326

# ── Storage ───────────────────────────────────────────────────
[storage]
enabled         = true
file_size_limit = "50MiB"  # artwork HD images

[storage.image_transformation]
enabled = true

# ── Auth ──────────────────────────────────────────────────────
[auth]
enabled                        = true
site_url                       = "http://127.0.0.1:3000"
additional_redirect_urls       = ["https://127.0.0.1:3000"]
jwt_expiry                     = 3600
enable_refresh_token_rotation  = true
refresh_token_reuse_interval   = 10
enable_signup                  = true
enable_anonymous_sign_ins      = false
enable_manual_linking          = false
minimum_password_length        = 8

[auth.email]
enable_signup         = true
double_confirm_changes = true
enable_confirmations  = false   # true en production
secure_password_change = false
max_frequency         = "1s"

[auth.sms]
enable_signup         = false
enable_confirmations  = false
max_frequency         = "5s"

# OAuth Google (facultatif)
[auth.external.google]
enabled    = false
client_id  = "env(GOOGLE_CLIENT_ID)"
secret     = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""
url          = ""

# OAuth GitHub (facultatif)
[auth.external.github]
enabled    = false
client_id  = "env(GITHUB_CLIENT_ID)"
secret     = "env(GITHUB_CLIENT_SECRET)"
redirect_uri = ""
url          = ""

# ── Edge Functions ────────────────────────────────────────────
[edge_runtime]
enabled        = true
policy         = "oneshot"
inspector_port = 8083

# ── Analytics ─────────────────────────────────────────────────
[analytics]
enabled  = false
port     = 54327
backend  = "postgres"
