name: ci

# Gate AVANT merge : typecheck + tests unitaires.
# Complète les smoke-tests (qui, eux, tournent en post-deploy contre la prod)
# et le build de prévisualisation Vercel sur chaque PR.
# Scope : art-core + pass-core + prime-core (les 3 apps web sous gate).
# NOTE: `npm run lint` (next lint) n'est PAS dans le gate : aucune config
# ESLint n'existe (next lint prompte). À ajouter avec un .eslintrc + nettoyage
# de la dette lint existante, sinon le gate casserait sur du préexistant.

on:
  pull_request:
    paths:
      - "art-core/**"
      - "pass-core/**"
      - "prime-core/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  art-core:
    name: art-core — typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: art-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: art-core/package-lock.json
      - name: install deps
        run: npm ci --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: unit tests
        run: npm test

  pass-core:
    name: pass-core — typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: pass-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pass-core/package-lock.json
      - name: install deps
        run: npm ci --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: unit tests
        run: npm test

  prime-core:
    name: prime-core — typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: prime-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: prime-core/package-lock.json
      - name: install deps
        run: npm ci --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: unit tests
        run: npm test
