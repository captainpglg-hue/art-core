name: Deploy prime-core

on:
  push:
    branches: [main]
    paths:
      - 'prime-core/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Projet Vercel qui sert RÉELLEMENT prime-core (www.prime-core.app).
    # Nom historique trompeur = "fresh-core-app". IDs figés ici pour ne plus
    # dépendre d'un scan par alias (qui tombait sur le projet apex en redirect)
    # ni d'un `cd prime-core` (qui se cumulait au Root Directory du projet =
    # "prime-core" → chemin prime-core/prime-core inexistant).
    env:
      VERCEL_ORG_ID: team_Ey0JNi1Ok35Kpv64uu9zRtaS
      VERCEL_PROJECT_ID: prj_wJ31AApnU0saNw2FoAXnpMPmaYHx
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        # Lancé depuis la RACINE du repo : le Root Directory "prime-core" du
        # projet Vercel résout correctement vers art-core/prime-core. Les IDs
        # ORG/PROJECT remplacent le `vercel link` (pas de secret, ce sont des
        # identifiants publics).
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
