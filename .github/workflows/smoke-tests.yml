# Re-triggered 2026-05-25T06:52:29Z apres seed Supabase OK
# 2026-05-29 : cron horaire desactive — prod renvoyait 403 a chaque
# visiteur anonyme depuis le 25 mai, generant 1 email d'echec par
# heure pour rien. Reactiver le cron quand prod sera healthy :
#   curl -I https://art-core.app/ doit renvoyer 200 ou 30x, pas 403.
name: smoke-tests

on:
  push:
    branches: ["**"]
    paths:
      - "tests/smoke/**"
      - ".github/workflows/smoke-tests.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    name: production smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: tests/smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/smoke/package-lock.json

      - name: install deps
        run: npm install --no-audit --no-fund

      - name: install playwright browsers
        run: npx playwright install --with-deps chromium

      - name: check prod is reachable
        id: prodcheck
        working-directory: .
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://art-core.app/ || echo 000)
          echo "art-core.app returned HTTP $code"
          if [ "$code" = "403" ] || [ "$code" = "000" ] || [ "$code" = "502" ] || [ "$code" = "503" ] || [ "$code" = "504" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Prod indisponible (HTTP $code) — smoke tests sautes. Reactivez quand curl -I https://art-core.app/ renvoie 200/30x."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: run smoke tests
        if: steps.prodcheck.outputs.skip != 'true'
        run: npx playwright test --reporter=list,github
        env:
          CI: "true"

      - name: upload html report
        if: always() && steps.prodcheck.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/smoke/playwright-report
          retention-days: 7
